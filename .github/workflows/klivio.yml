name: Klivio Pipeline

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml
      - name: Run Klivio
        env:
          YOUR_EMAIL:       ${{ secrets.YOUR_EMAIL }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PREVIEW_MODE:     ${{ secrets.PREVIEW_MODE }}
          BREVO_PASS_1:     ${{ secrets.BREVO_PASS_1 }}
          BREVO_PASS_2:     ${{ secrets.BREVO_PASS_2 }}
          BREVO_PASS_3:     ${{ secrets.BREVO_PASS_3 }}
          BREVO_PASS_4:     ${{ secrets.BREVO_PASS_4 }}
          BREVO_PASS_5:     ${{ secrets.BREVO_PASS_5 }}
          BREVO_PASS_6:     ${{ secrets.BREVO_PASS_6 }}
          BREVO_PASS_7:     ${{ secrets.BREVO_PASS_7 }}
          BREVO_PASS_8:     ${{ secrets.BREVO_PASS_8 }}
          BREVO_PASS_9:     ${{ secrets.BREVO_PASS_9 }}
          BREVO_PASS_10:    ${{ secrets.BREVO_PASS_10 }}
          BREVO_PASS_11:    ${{ secrets.BREVO_PASS_11 }}
          BREVO_PASS_12:    ${{ secrets.BREVO_PASS_12 }}
          BREVO_PASS_13:    ${{ secrets.BREVO_PASS_13 }}
          BREVO_PASS_14:    ${{ secrets.BREVO_PASS_14 }}
          BREVO_PASS_15:    ${{ secrets.BREVO_PASS_15 }}
          BREVO_PASS_16:    ${{ secrets.BREVO_PASS_16 }}
          BREVO_PASS_17:    ${{ secrets.BREVO_PASS_17 }}
          BREVO_PASS_18:    ${{ secrets.BREVO_PASS_18 }}
          BREVO_PASS_19:    ${{ secrets.BREVO_PASS_19 }}
        run: python klivio_combined.py
